<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今天的你選擇說什麼？</title>
  <style>
:root {
  --paper: #e8ddbf;
  --paper-deep: #d4c59d;
  --ink: #1e1c18;
  --muted-ink: #595143;
  --red: #8d1e1e;
  --black: #11100e;
  --shadow: rgba(22, 18, 12, 0.35);
  --line: rgba(63, 50, 32, 0.28);
}

* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  color: var(--ink);
  font-family: Georgia, "Times New Roman", "Noto Serif TC", "Songti TC", serif;
  background:
    linear-gradient(rgba(30, 24, 14, 0.42), rgba(30, 24, 14, 0.62)),
    repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 4px),
    radial-gradient(circle at top left, #5b5142 0, #2b2924 50%, #161512 100%);
}

button {
  font: inherit;
}

.archive-shell {
  display: grid;
  min-height: 100vh;
  padding: 36px 18px;
  place-items: center;
}

.screen {
  display: none;
  width: min(880px, 100%);
}

.screen-active {
  display: block;
}

.paper-panel {
  position: relative;
  overflow: hidden;
  width: 100%;
  border: 1px solid rgba(70, 54, 29, 0.45);
  background:
    linear-gradient(90deg, rgba(17, 16, 14, 0.08) 0 8%, transparent 8% 100%),
    repeating-linear-gradient(0deg, transparent 0 31px, rgba(90, 70, 35, 0.16) 32px 33px),
    radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.34), transparent 18%),
    linear-gradient(135deg, #f2e8cb, var(--paper) 52%, #d9c89f);
  box-shadow: 0 28px 60px var(--shadow);
}

.paper-panel::before,
.paper-panel::after {
  position: absolute;
  content: "";
  pointer-events: none;
}

.paper-panel::before {
  inset: 0;
  background:
    repeating-radial-gradient(circle at 20% 30%, rgba(55, 37, 12, 0.09) 0 1px, transparent 1px 7px),
    linear-gradient(80deg, transparent 0 70%, rgba(80, 54, 22, 0.11) 70% 71%, transparent 71% 100%);
  mix-blend-mode: multiply;
}

.paper-panel::after {
  right: 34px;
  bottom: 34px;
  width: 190px;
  height: 64px;
  border: 4px double rgba(141, 30, 30, 0.52);
  color: rgba(141, 30, 30, 0.52);
  content: "存 查";
  display: grid;
  place-items: center;
  font-family: "Courier New", "Noto Sans Mono CJK TC", monospace;
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.28em;
  transform: rotate(-8deg);
}

.intro-panel,
.file-card,
.result-card {
  min-height: 560px;
  padding: clamp(32px, 6vw, 72px);
}

.file-card {
  background: linear-gradient(135deg, #f2e8cb, var(--paper) 52%, #d9c89f);
}

.file-card::before {
  display: none;
}

.question-bg {
  display: none;
}

.file-card[data-question="1"] .question-bg,
.file-card[data-question="2"] .question-bg,
.file-card[data-question="3"] .question-bg,
.file-card[data-question="4"] .question-bg,
.file-card[data-question="5"] .question-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  display: block;
  pointer-events: none;
}

.book,
.listener,
.letter-bg,
.reading-bg,
.diary-bg {
  display: none;
}

.book,
.listener,
.letter-bg,
.reading-bg,
.diary-bg {
  position: absolute;
  background-position: center;
  background-repeat: no-repeat;
  background-size: contain;
  box-shadow: 0 10px 24px rgba(34, 25, 12, 0.22);
  filter: sepia(0.25) contrast(0.9);
  opacity: 0.58;
}

.file-card[data-question="1"] .book,
.file-card[data-question="2"] .listener,
.file-card[data-question="3"] .letter-bg,
.file-card[data-question="4"] .reading-bg,
.file-card[data-question="5"] .diary-bg {
  display: block;
}

.book-aq {
  top: 34px;
  left: clamp(16px, 5vw, 46px);
  width: clamp(210px, 32vw, 310px);
  aspect-ratio: 507 / 720;
  background-image: url("阿Q正傳.jpg");
  transform: rotate(-11deg);
}

.book-romeo {
  right: clamp(12px, 5vw, 44px);
  bottom: 28px;
  width: clamp(172px, 26vw, 238px);
  aspect-ratio: 254 / 450;
  background-image: url("羅密歐與茱麗葉.jpg");
  transform: rotate(10deg);
}

.listener {
  filter: sepia(0.12) contrast(0.92);
  opacity: 0.5;
  box-shadow: none;
}

.listener-case {
  top: 104px;
  left: clamp(0px, 4vw, 34px);
  width: clamp(300px, 46vw, 460px);
  aspect-ratio: 1123 / 1087;
  background-image: url("復古行李箱唱片機_真去背_裁切.png");
  transform: rotate(-8deg);
}

.listener-wire {
  right: clamp(-22px, 3vw, 30px);
  bottom: 104px;
  width: clamp(280px, 42vw, 430px);
  aspect-ratio: 881 / 1045;
  background-image: url("監聽器_真去背_裁切.png");
  transform: rotate(9deg);
}

.letter-bg {
  inset: 54px 34px 42px 34px;
  background-image: url("信件.png");
  background-size: cover;
  filter: sepia(0.18) contrast(0.9);
  opacity: 0.62;
  transform: rotate(-3deg);
}

.reading-bg {
  inset: 44px 24px 32px 24px;
  background-image: url("讀書會.png");
  background-size: cover;
  filter: sepia(0.18) contrast(0.88);
  opacity: 0.58;
  transform: rotate(2deg);
}

.diary-bg {
  inset: 42px 26px 30px 26px;
  background-image: url("書桌日記.png");
  background-size: cover;
  filter: sepia(0.18) contrast(0.88);
  opacity: 0.58;
  transform: rotate(-2deg);
}

.intro-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.case-label,
.scene-time,
.feedback {
  font-family: "Courier New", "Noto Sans Mono CJK TC", monospace;
}

.case-label {
  margin: 0 0 18px;
  color: var(--muted-ink);
  font-size: 0.88rem;
  letter-spacing: 0.16em;
}

h1,
h2 {
  position: relative;
  margin: 0;
  line-height: 1.18;
  letter-spacing: 0;
}

h1 {
  max-width: 12em;
  font-size: clamp(3rem, 9vw, 6.8rem);
  font-weight: 700;
}

h1::after {
  display: block;
  width: min(540px, 86%);
  height: 18px;
  margin-top: 14px;
  background: var(--black);
  content: "";
}

.subtitle,
.scene-text,
.result-description {
  position: relative;
  max-width: 720px;
  color: #2f2a22;
  font-size: clamp(1.05rem, 2.4vw, 1.3rem);
  line-height: 1.9;
}

.subtitle {
  margin: 34px 0 44px;
}

.primary-btn {
  position: relative;
  z-index: 1;
  width: fit-content;
  min-width: 148px;
  border: 1px solid rgba(30, 24, 15, 0.74);
  background: #1f1d19;
  color: #f2ead7;
  cursor: pointer;
  font-family: "Courier New", "Noto Sans Mono CJK TC", monospace;
  font-size: 1rem;
  letter-spacing: 0.1em;
  padding: 14px 24px;
  transition: transform 160ms ease, background 160ms ease;
}

.primary-btn:hover,
.primary-btn:focus-visible {
  background: #3a3228;
  transform: translateY(-1px);
}

.file-topline {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
}

.stamp {
  border: 3px solid rgba(141, 30, 30, 0.72);
  color: rgba(141, 30, 30, 0.74);
  font-family: "Courier New", "Noto Sans Mono CJK TC", monospace;
  font-weight: 700;
  padding: 8px 14px;
  transform: rotate(6deg);
}

.time-block {
  position: relative;
  z-index: 1;
  margin-top: 24px;
}

.scene-time {
  margin: 0 0 10px;
  color: var(--red);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.12em;
}

.time-block h2,
.result-card h2 {
  font-size: clamp(2rem, 5vw, 3.7rem);
}

.scene-text {
  z-index: 1;
  margin: 28px 0 28px;
}

.options-list {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 12px;
}

.option-btn {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  width: 100%;
  border: 1px solid rgba(66, 50, 28, 0.42);
  background: rgba(248, 240, 216, 0.56);
  color: var(--ink);
  cursor: pointer;
  padding: 16px 18px;
  text-align: left;
  transition: border-color 140ms ease, background 140ms ease, transform 140ms ease;
}

.option-btn:hover,
.option-btn:focus-visible {
  border-color: rgba(141, 30, 30, 0.72);
  background: rgba(255, 248, 226, 0.72);
  transform: translateX(3px);
}

.option-btn:disabled {
  cursor: default;
  opacity: 0.72;
  transform: none;
}

.option-text {
  line-height: 1.65;
}

.feedback {
  min-height: 28px;
  margin: 22px 0 0;
  color: var(--red);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 160ms ease, transform 160ms ease;
}

.feedback.visible {
  opacity: 1;
  transform: translateY(0);
}

.result-card {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.result-description {
  margin: 24px 0 34px;
}

.bars {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 20px;
  margin-bottom: 38px;
}

.bar-row {
  display: grid;
  gap: 9px;
}

.bar-label {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  font-family: "Courier New", "Noto Sans Mono CJK TC", monospace;
}

.bar-track {
  height: 18px;
  border: 1px solid rgba(35, 30, 24, 0.55);
  background:
    repeating-linear-gradient(90deg, rgba(24, 22, 19, 0.11) 0 1px, transparent 1px 12px),
    rgba(240, 231, 205, 0.84);
}

.bar-fill {
  width: 0;
  height: 100%;
  transition: width 700ms ease;
}

.freedom-fill { background: #4f4a3d; }
.risk-fill { background: #8d1e1e; }
.relationship-fill { background: #6b5534; }

@media (max-width: 640px) {
  .archive-shell { padding: 16px; }
  .intro-panel,
  .file-card,
  .result-card {
    min-height: calc(100vh - 32px);
    padding: 28px 22px;
  }
  .paper-panel::after {
    right: 18px;
    bottom: 22px;
    width: 128px;
    height: 46px;
    font-size: 1.05rem;
  }
  h1::after { height: 13px; }
  .file-topline { align-items: flex-start; }
  .stamp {
    padding: 6px 9px;
    font-size: 0.82rem;
  }
  .option-btn {
    grid-template-columns: 1fr;
    gap: 6px;
    padding: 14px;
  }
}
  </style>
</head>
<body>
  <main class="archive-shell">
    <section id="start-screen" class="screen screen-active intro-screen" aria-labelledby="site-title">
      <div class="paper-panel intro-panel">
        <p class="case-label">白色恐怖時期日常紀錄</p>
        <h1 id="site-title">今天的你<br>選擇說什麼？</h1>
        <p class="subtitle">在白色恐怖時期，日常生活中的每一句話、每一本書、每一封信，都需要小心衡量。</p>
        <button id="start-btn" class="primary-btn" type="button">開始你的一天</button>
      </div>
    </section>

    <section id="quiz-screen" class="screen" aria-live="polite">
      <article id="question-card" class="paper-panel file-card">
        <div class="question-bg" aria-hidden="true">
          <span class="book book-aq"></span>
          <span class="book book-romeo"></span>
          <span class="listener listener-case"></span>
          <span class="listener listener-wire"></span>
          <span class="letter-bg"></span>
          <span class="reading-bg"></span>
          <span class="diary-bg"></span>
        </div>
        <div class="file-topline">
          <span id="question-count" class="case-label"></span>
          <span class="stamp" aria-hidden="true">審閱中</span>
        </div>
        <div class="time-block">
          <p id="scene-time" class="scene-time"></p>
          <h2 id="scene-title"></h2>
        </div>
        <p id="scene-text" class="scene-text"></p>
        <div id="options" class="options-list"></div>
        <p id="feedback" class="feedback" role="status"></p>
      </article>
    </section>

    <section id="result-screen" class="screen" aria-labelledby="result-title">
      <article class="paper-panel result-card">
        <p class="case-label">一日紀錄結案</p>
        <h2 id="result-title"></h2>
        <p id="result-description" class="result-description"></p>
        <div class="bars" aria-label="三項指標分數">
          <div class="bar-row"><div class="bar-label"><span>表達自由</span><strong id="freedom-value">0</strong></div><div class="bar-track"><div id="freedom-bar" class="bar-fill freedom-fill"></div></div></div>
          <div class="bar-row"><div class="bar-label"><span>安全風險</span><strong id="risk-value">0</strong></div><div class="bar-track"><div id="risk-bar" class="bar-fill risk-fill"></div></div></div>
          <div class="bar-row"><div class="bar-label"><span>關係代價</span><strong id="relationship-value">0</strong></div><div class="bar-track"><div id="relationship-bar" class="bar-fill relationship-fill"></div></div></div>
        </div>
        <button id="restart-btn" class="primary-btn" type="button">重新測驗</button>
      </article>
    </section>
  </main>

  <script>
const questions=[{time:"早上",title:"家中桌上的書",text:"你準備出門上學／上班，桌上放著一本朋友借你的書。母親提醒你：「最近外面風聲很緊，不要帶奇怪的書出門。」",options:[{text:"把書帶出門，照常閱讀。",scores:{freedomScore:20,riskScore:20,relationshipCost:2},feedback:"可能遭關注"},{text:"把書留在家裡，但晚上再讀。",scores:{freedomScore:13,riskScore:8,relationshipCost:3},feedback:"已記錄"},{text:"把書還給朋友，避免麻煩。",scores:{freedomScore:3,riskScore:2,relationshipCost:13},feedback:"已記錄"},{text:"先問朋友這本書是否安全。",scores:{freedomScore:9,riskScore:7,relationshipCost:1},feedback:"注意"}]},{time:"中午",title:"學校同儕的抱怨",text:"同學私下抱怨政府政策，問你怎麼看。旁邊還有幾個不熟的人。",options:[{text:"說出自己的真實想法。",scores:{freedomScore:22,riskScore:22,relationshipCost:0},feedback:"可能遭關注"},{text:"小聲提醒對方不要亂說。",scores:{freedomScore:7,riskScore:8,relationshipCost:0},feedback:"注意"},{text:"假裝沒聽到，轉移話題。",scores:{freedomScore:2,riskScore:2,relationshipCost:8},feedback:"已記錄"},{text:"附和幾句，但不說太多。",scores:{freedomScore:11,riskScore:12,relationshipCost:2},feedback:"注意"}]},{time:"下午",title:"郵局裡的信",text:"你收到海外親友的來信，對方問你最近台灣的情況。",options:[{text:"詳細寫下你的觀察與不滿。",scores:{freedomScore:23,riskScore:24,relationshipCost:0},feedback:"可能遭關注"},{text:"只寫家中近況，不談社會與政治。",scores:{freedomScore:4,riskScore:3,relationshipCost:4},feedback:"已記錄"},{text:"寫得很隱晦，讓對方自己理解。",scores:{freedomScore:14,riskScore:12,relationshipCost:1},feedback:"注意"},{text:"暫時不回信。",scores:{freedomScore:1,riskScore:1,relationshipCost:14},feedback:"已記錄"}]},{time:"傍晚",title:"秘密讀書會",text:"朋友邀你參加一場小型讀書會，說只是討論文學和社會問題。",options:[{text:"參加，並帶一本想分享的書。",scores:{freedomScore:22,riskScore:23,relationshipCost:0},feedback:"可能遭關注"},{text:"詢問還有哪些人會去。",scores:{freedomScore:10,riskScore:9,relationshipCost:1},feedback:"注意"},{text:"拒絕，並提醒朋友小心。",scores:{freedomScore:5,riskScore:6,relationshipCost:2},feedback:"注意"},{text:"不回應邀約，之後慢慢疏遠。",scores:{freedomScore:0,riskScore:1,relationshipCost:22},feedback:"已記錄"}]},{time:"晚上",title:"抽屜裡的日記",text:"你回到家，想在日記裡寫下今天的心情。你會怎麼寫？",options:[{text:"完整寫下今天的不安與憤怒。",scores:{freedomScore:22,riskScore:17,relationshipCost:0},feedback:"可能遭關注"},{text:"只寫生活瑣事。",scores:{freedomScore:3,riskScore:2,relationshipCost:3},feedback:"已記錄"},{text:"用暗語記錄真正想法。",scores:{freedomScore:13,riskScore:8,relationshipCost:1},feedback:"注意"},{text:"不寫，直接把日記收起來。",scores:{freedomScore:0,riskScore:0,relationshipCost:6},feedback:"已記錄"}]}];
const results={silent:{title:"沉默求生",description:"你讓自己維持在相對安全的位置，但代價是越來越少說、少問、少參與。你不是沒有想法，而是學會把想法藏起來。"},cautious:{title:"謹慎觀望",description:"你仍試著保留判斷，但每一句話都必須先計算後果。生活看似正常，實際上已充滿自我審查。"},severed:{title:"關係切割",description:"你選擇與可能帶來風險的人保持距離。這讓你比較安全，卻也讓朋友、鄰居與家人之間的信任逐漸瓦解。"},exposed:{title:"風險承擔",description:"你盡可能保留表達與行動，但也因此暴露在更高的監控與牽連風險之中。"}};
let currentQuestionIndex=0,freedomScore=0,riskScore=0,relationshipCost=0;
const startScreen=document.querySelector("#start-screen"),quizScreen=document.querySelector("#quiz-screen"),resultScreen=document.querySelector("#result-screen"),startBtn=document.querySelector("#start-btn"),restartBtn=document.querySelector("#restart-btn"),questionCount=document.querySelector("#question-count"),sceneTime=document.querySelector("#scene-time"),sceneTitle=document.querySelector("#scene-title"),sceneText=document.querySelector("#scene-text"),questionCard=document.querySelector("#question-card"),optionsContainer=document.querySelector("#options"),feedback=document.querySelector("#feedback");
startBtn.addEventListener("click",startQuiz);restartBtn.addEventListener("click",startQuiz);
function startQuiz(){currentQuestionIndex=0;freedomScore=0;riskScore=0;relationshipCost=0;showScreen(quizScreen);renderQuestion()}
function showScreen(activeScreen){[startScreen,quizScreen,resultScreen].forEach(screen=>screen.classList.toggle("screen-active",screen===activeScreen))}
function renderQuestion(){const question=questions[currentQuestionIndex];questionCard.dataset.question=String(currentQuestionIndex+1);questionCount.textContent=`檔案 ${currentQuestionIndex+1} / ${questions.length}`;sceneTime.textContent=question.time;sceneTitle.textContent=question.title;sceneText.textContent=question.text;feedback.textContent="";feedback.classList.remove("visible");optionsContainer.innerHTML="";question.options.forEach(option=>{const button=document.createElement("button");button.className="option-btn";button.type="button";button.innerHTML=`<span class="option-text">${option.text}</span>`;button.addEventListener("click",()=>chooseOption(option));optionsContainer.appendChild(button)})}
function chooseOption(option){freedomScore+=option.scores.freedomScore;riskScore+=option.scores.riskScore;relationshipCost+=option.scores.relationshipCost;optionsContainer.querySelectorAll("button").forEach(button=>button.disabled=true);feedback.textContent=option.feedback;feedback.classList.add("visible");window.setTimeout(()=>{currentQuestionIndex+=1;if(currentQuestionIndex>=questions.length){showResult();return}renderQuestion()},850)}
function showResult(){const scores=normalizeScores({freedomScore,riskScore,relationshipCost});const result=determineResult(scores);document.querySelector("#result-title").textContent=result.title;document.querySelector("#result-description").textContent=result.description;updateBar("freedom",scores.freedomScore);updateBar("risk",scores.riskScore);updateBar("relationship",scores.relationshipCost);showScreen(resultScreen)}
function normalizeScores(scores){return{freedomScore:clamp(scores.freedomScore),riskScore:clamp(scores.riskScore),relationshipCost:clamp(scores.relationshipCost)}}
function clamp(value){return Math.max(0,Math.min(100,value))}
function determineResult(scores){if(scores.relationshipCost>=45)return results.severed;if(scores.freedomScore>=70&&scores.riskScore>=65)return results.exposed;if(scores.freedomScore<=25&&scores.riskScore<=20)return results.silent;return results.cautious}
function updateBar(type,value){document.querySelector(`#${type}-value`).textContent=value;document.querySelector(`#${type}-bar`).style.width=`${value}%`}
  </script>
</body>
</html>
